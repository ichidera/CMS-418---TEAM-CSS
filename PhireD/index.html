<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WETS | Wireless Emergency Telemedicine System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        
        <!-- Header Section -->
        <header class="main-header">
            <div class="logo-placeholder">
                <!-- Replace with your logo later -->
                <div class="logo-box">WETS</div>
            </div>
            <h1>Wireless Emergency Telemedicine System</h1>
        </header>

        <!-- Hero Section: Quote and Doctors (50/50 Split) -->
        <section class="hero-section">
            <div class="quote-box">
                <p class="quote">"In the rhythm of the human heart, we find the cadence of life. Protecting that rhythm is our highest calling."</p>
            </div>
            <div class="doctor-image">
                <!-- Placeholder image for doctors -->
                <img src="doctor.jpg" alt="Medical Team">
            </div>
        </section>

        <!-- Login Section: Stethoscope and Form (25/75 Split) -->
        <section class="login-section">
            <div class="side-visual">
                <img src="https://images.unsplash.com/photo-1584982751601-97dcc096659c?auto=format&fit=crop&q=80&w=600" alt="Stethoscope">
            </div>
            <div class="login-form-container">
                <form class="login-form">
                    <h2>Member Login</h2>
                    <div class="input-group">
                        <label for="username">User Name</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="login-btn">Log-in</button>
                    <p class="signup-link">New user? <a href="#">Sign up here</a></p>
                </form>
            </div>
        </section>

    </div>
</body>
</html>
